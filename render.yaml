services:
  - type: web
    name: travelwithmeai-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime
      - key: NODE_ENV
        value: production
      - key: REQUEST_TIMEOUT_MS
        value: 30000
      - key: ALLOWED_ORIGINS
        value: https://travelwithmeai-server.onrender.com,https://api.travelwithmeai.com
